; PlatformIO Project Configuration File

[platformio]
; Uncomment to load WiFi/WebSocket credentials from a local file (gitignored):
; extra_configs = platformio_secrets.ini

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = espidf
build_flags = -fno-ira-loop-pressure

; ── Web gateway (WiFi + WebSocket) ──────────────────────────────────────────
; To enable the link to the Blazor web server, use the env below OR create
; platformio_secrets.ini with a [env:heltec_wifi_lora_32_V3_web] section
; that sets MESH_WIFI_SSID, MESH_WIFI_PASS and MESH_WS_URI as env variables,
; then build with: pio run -e heltec_wifi_lora_32_V3_web
;
; Example platformio_secrets.ini (never commit this file):
;
;   [env:heltec_wifi_lora_32_V3_web]
;   platform = espressif32
;   board = heltec_wifi_lora_32_V3
;   framework = espidf
;   build_flags =
;       -fno-ira-loop-pressure
;       -DMESH_WEB_ENABLED
;       -DWIFI_SSID=\"MonReseau\"
;       -DWIFI_PASS=\"MonMotDePasse\"
;       -DWS_URI=\"ws://mon-app.azurewebsites.net/ws/node\"
