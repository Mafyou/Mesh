name: Web

on:
  push:
    branches: [main]
    paths:
      - 'src/Mesh.Web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

jobs:
  publish-web:
    name: Publish Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/Mesh.Web/Mesh.Web/Mesh.Web.csproj -r linux-x64

      - name: Publish
        run: dotnet publish src/Mesh.Web/Mesh.Web/Mesh.Web.csproj -c Release -r linux-x64 --self-contained false -o publish/web --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: publish/web

      # AZURE_WEBAPP_NAME            : nom de la Web App Azure
      # AZURE_WEBAPP_PUBLISH_PROFILE : contenu du profil de publication (.PublishSettings)
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish/web
