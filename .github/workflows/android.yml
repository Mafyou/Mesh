name: Android

on:
  push:
    branches: [main]
    paths:
      - 'src/Mesh.Mobile/**'
      - 'src/Mesh.Mobile.Core/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.2.3)'
        required: false
        default: ''
  workflow_call:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.2.3)'
        required: false
        type: string
        default: ''
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore src/Mesh.Mobile/Mesh.Mobile.csproj

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/mafyou.keystore

      - name: Set version from tag
        if: inputs.version != ''
        run: |
          VERSION="${{ inputs.version }}"
          echo "DISPLAY_VERSION=${VERSION#v}" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build signed AAB
        run: |
          dotnet publish src/Mesh.Mobile/Mesh.Mobile.csproj \
            -c Release \
            -f net10.0-android \
            --no-restore \
            -p:AndroidPackageFormat=aab \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=/tmp/mafyou.keystore \
            "-p:AndroidSigningKeyAlias=Mafyou" \
            "-p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }}" \
            "-p:AndroidSigningStorePass=${{ secrets.ANDROID_KEY_PASSWORD }}" \
            ${DISPLAY_VERSION:+-p:ApplicationDisplayVersion=$DISPLAY_VERSION} \
            ${VERSION_CODE:+-p:ApplicationVersion=$VERSION_CODE} \
            -o publish/android

      - name: Rename AAB
        run: |
          AAB=$(find publish/android -name "*.aab" -print -quit)
          [ -n "$AAB" ] || { echo "::error::No .aab found in publish/android"; exit 1; }
          mv "$AAB" publish/android/MeshUnited.aab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: publish/android/MeshUnited.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/mafyou.keystore
