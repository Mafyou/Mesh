name: Android

on:
  push:
    branches: [main]
    paths:
      - 'src/Mesh.Mobile/**'
      - 'src/Mesh.Mobile.Core/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
  workflow_call:
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore src/Mesh.Mobile/Mesh.Mobile.csproj

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/mafyou.keystore

      - name: Build signed AAB
        run: |
          dotnet publish src/Mesh.Mobile/Mesh.Mobile.csproj \
            -c Release \
            -f net10.0-android \
            -p:AndroidPackageFormat=aab \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=/tmp/mafyou.keystore \
            "-p:AndroidSigningKeyAlias=Mafyou" \
            "-p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }}" \
            "-p:AndroidSigningStorePass=${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -o publish/android

      - name: Rename AAB
        run: find publish/android -name "*.aab" | head -1 | xargs -I{} cp {} publish/android/MeshUnited.aab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: publish/android/MeshUnited.aab

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/mafyou.keystore
