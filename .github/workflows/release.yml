name: Release

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'src/Mesh.Web/**'
      - 'src/Mesh.Mobile/**'
      - 'src/Mesh.Mobile.Core/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  build-firmware:
    name: Build Firmware
    uses: ./.github/workflows/firmware.yml
    secrets: inherit

  build-android:
    name: Build Android AAB
    uses: ./.github/workflows/android.yml
    secrets: inherit

  publish-web:
    name: Publish Web
    needs: [build-firmware, build-android]
    uses: ./.github/workflows/web.yml
