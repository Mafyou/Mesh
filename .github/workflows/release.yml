name: Release

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'src/Mesh.Web/**'
      - 'src/Mesh.Mobile/**'
      - 'src/Mesh.Mobile.Core/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run -e heltec_wifi_lora_32_V3
        working-directory: firmware

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: firmware/.pio/build/heltec_wifi_lora_32_V3/firmware.bin

  build-android:
    name: Build Android AAB
    uses: ./.github/workflows/android.yml
    secrets: inherit

  publish-web:
    name: Publish Web
    needs: [build-firmware, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/Mesh.Web/Mesh.Web/Mesh.Web.csproj

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: firmware-bin

      - name: Copy firmware to wwwroot
        run: |
          mkdir -p src/Mesh.Web/Mesh.Web/wwwroot/firmware
          cp firmware-bin/firmware.bin src/Mesh.Web/Mesh.Web/wwwroot/firmware/Mesh.Core.bin

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: android-aab

      - name: Copy AAB to wwwroot
        run: |
          mkdir -p src/Mesh.Web/Mesh.Web/wwwroot/app
          cp android-aab/MeshUnited.aab src/Mesh.Web/Mesh.Web/wwwroot/app/MeshUnited.aab

      - name: Publish
        run: dotnet publish src/Mesh.Web/Mesh.Web/Mesh.Web.csproj -c Release --self-contained true -r linux-x64 -o publish/web --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: publish/web

      # AZURE_WEBAPP_NAME            : nom de la Web App Azure
      # AZURE_WEBAPP_PUBLISH_PROFILE : contenu du profil de publication (.PublishSettings)
      # ANDROID_KEYSTORE_BASE64      : keystore Mafyou encodé en base64 (base64 Mafyou.keystore)
      # ANDROID_KEY_PASSWORD         : mot de passe du keystore et de la clé
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish/web
